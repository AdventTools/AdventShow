name: Build & Release (Windows + Linux)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            cmd: npm run build:win
          - os: ubuntu-latest
            cmd: npm run build:linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          # ffmpeg-static uneori 504 la prima încercare pe GitHub CDN — retry automat
          npm_config_fetch_retry_mintimeout: 20000
          npm_config_fetch_retries: 3
          npm_config_fetch_retry_maxtimeout: 120000

      - name: Build
        run: ${{ matrix.cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract app.asar for delta updates
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          RELEASE_DIR="release/${VERSION}"
          
          # Find app.asar in the build output
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ASAR_SRC="${RELEASE_DIR}/win-unpacked/resources/app.asar"
          else
            ASAR_SRC="${RELEASE_DIR}/linux-unpacked/resources/app.asar"
          fi
          
          if [ -f "$ASAR_SRC" ]; then
            PLATFORM=$( [ "${{ matrix.os }}" = "windows-latest" ] && echo "win" || echo "linux" )
            cp "$ASAR_SRC" "${RELEASE_DIR}/app-update-${PLATFORM}.asar"
            echo "Extracted app.asar for ${PLATFORM} delta updates"
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*-Setup.exe
            release/**/*.AppImage
          draft: false
          prerelease: false
