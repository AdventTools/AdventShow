name: Build & Release (Windows + Linux)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            cmd: npm run build && npx electron-builder --win --publish never
          - os: ubuntu-latest
            cmd: npm run build && npx electron-builder --linux --publish never

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          # ffmpeg-static uneori 504 la prima încercare pe GitHub CDN — retry automat
          npm_config_fetch_retry_mintimeout: 20000
          npm_config_fetch_retries: 3
          npm_config_fetch_retry_maxtimeout: 120000

      - name: Build
        run: ${{ matrix.cmd }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*-Setup.exe
            release/**/*.AppImage
          draft: false
          prerelease: false
