name: Build & Release (Linux)

# Windows și macOS sunt build-uite local și semnate (Developer ID, Azure Trusted Signing)
# înainte de tag — vezi docs/PROCEDURE.md. CI-ul GitHub Actions construiește
# doar AppImage pentru Linux la push de tag.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_fetch_retry_mintimeout: 20000
          npm_config_fetch_retries: 3
          npm_config_fetch_retry_maxtimeout: 120000

      - name: Build Linux
        run: npm run build && npx electron-builder --linux --publish never

      - name: Upload AppImage
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.AppImage
          draft: false
          prerelease: false
